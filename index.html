<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1, maximum-scale=5, user-scalable=1" />
  <title>Jogos da Galera</title>
  <link rel="icon" type="image/png" href="https://jogosdagalera.pages.dev/logowpp.png">
  <meta property="og:title" content="Jogos da Galera">
  <meta property="og:description" content="Seus jogos favoritos">
  <meta property="og:image" content="https://jogosdagalera.pages.dev/logowpp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:       #f1c40f;
      --yellow-dark:  #f39c12;
      --yellow-glow:  rgba(241, 196, 15, 0.18);
      --bg:           #0f1923;
      --bg-card:      #162230;
      --bg-card-hov:  #1c2d3f;
      --border:       rgba(255,255,255,0.07);
      --text:         #e8edf2;
      --text-muted:   #7a92a8;
      --tag-bg:       rgba(241, 196, 15, 0.13);
      --radius-card:  14px;
      --font:         'Nunito', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ─────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0c151e;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      gap: 32px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
      margin-left: 20px;
    }

    .nav-logo-icon {
      width: 120px;
      height: 32px;
      background: var(--yellow);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-logo-text {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .nav-logo-text span { color: var(--yellow); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-lang {
      background: #1a2635;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 48px 24px 36px;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(241,196,15,0.12) 0%, transparent 70%);
    }

    .hero h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .hero h1 span { color: var(--yellow); }

    .hero p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto 24px;
      line-height: 1.6;
    }

    .hero-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: var(--tag-bg);
      border: 1px solid rgba(241,196,15,0.3);
      color: var(--yellow);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── FILTERS ─────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 0 24px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      white-space: nowrap;
      background: #162230;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 7px 15px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all .18s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #0f1923;
    }

    /* ── SEARCH BAR ──────────────────────────────────────── */
    .search-container {
      padding: 0 24px 24px;
      display: flex;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 380px;
    }

    .nav-search {
      width: 100%;
      background: #1a2635;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 38px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .nav-search:focus { border-color: var(--yellow); }
    .nav-search::placeholder { color: var(--text-muted); }

    .nav-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── GAME GRID ──────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      padding: 0 24px 40px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.4), 0 0 0 1px var(--yellow);
      border-color: var(--yellow);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 12px 14px 14px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid rgba(241, 196, 15, 0.2);
      color: var(--yellow);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .tag.gray {
      background: rgba(122,146,168,0.1);
      border-color: rgba(122,146,168,0.2);
      color: var(--text-muted);
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .footer-logo {
      width: 120px;
      height: 32px;
      background: var(--yellow);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-links a {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      transition: color .15s;
    }
    .footer-links a:hover { color: var(--yellow); }

    .footer-copy {
      color: var(--text-muted);
      font-size: 12px;
    }

    .card.hidden { display: none; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 14px 32px; }
      .filters { padding: 0 14px 12px; }
      .search-container { padding: 0 14px 20px; }
      .search-box { max-width: 100%; }
      nav { padding: 0 14px; gap: 10px; }
      .hero { padding: 32px 14px 24px; }
    }

    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .card-body { padding: 8px 10px 10px; }
      .card-title { font-size: 13px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">
      <img src="https://jogosdagalera.pages.dev/logo2.png" alt="Jogos da Galera" style="height:60px;width:auto;display:block;">
    </div>
  </a>
  <div class="nav-right">
    <div class="nav-lang">🇧🇷 PT</div>
  </div>
</nav>

<header class="hero">
  <h1>Jogue <span>Grátis</span> com Amigos</h1>
  <p>Jogos multiplayer no navegador, sem cadastro. Convide amigos e jogue agora!</p>
  <div class="hero-badges">
    <span class="badge">✅ Sem Cadastro</span>
    <span class="badge">🎮 Multiplayer</span>
    <span class="badge">📥 Sem Download</span>
    <span class="badge">🆓 100% Grátis</span>
  </div>
</header>
  
<div class="filters">
  <button class="filter-btn active" onclick="filterGames('todos', this)">Todos</button>
  <button class="filter-btn" onclick="filterGames('palavras', this)">Palavras</button>
  <button class="filter-btn" onclick="filterGames('sinuca', this)">Sinuca</button>
  <button class="filter-btn" onclick="filterGames('tabuleiro', this)">Tabuleiro</button>
  <button class="filter-btn" onclick="filterGames('acao', this)">Ação</button>
  <button class="filter-btn" onclick="filterGames('quiz', this)">Quiz</button>
  <button class="filter-btn" onclick="filterGames('dados', this)">Dados</button>
</div>

<div class="search-container">
  <div class="search-box">
    <span class="nav-search-icon">🔍</span>
    <input class="nav-search" type="text" placeholder="Buscar jogo..." id="searchInput" />
  </div>
</div>

<main class="grid" id="gameGrid"></main>

<footer>
  <div class="footer-logo">
    <img src="https://jogosdagalera.pages.dev/logo2.png" alt="Jogos da Galera" style="height:60px;width:auto;display:block;">
  </div>
  <div class="footer-links">
    <a href="#">Apoiar</a>
    <a href="#">Pedir Jogo</a>
    <a href="#">Sugestões</a>
    <a href="#">Erros</a>
    <a href="#">Baixar</a>
  </div>
  <div class="footer-copy">© 2026 Jogos da Galera ♥️🎮</div>
</footer>

<script>
  const searchInput = document.getElementById('searchInput');
  const gameGrid = document.getElementById('gameGrid');
  let activeCategory = 'todos';

  function updateGames() {
    const query = searchInput.value.toLowerCase().trim();
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      const cardCategory = card.dataset.category || '';
      const cardName = card.dataset.name || '';

      const matchCategory = activeCategory === 'todos' || cardCategory === activeCategory;
      const matchSearch = query.length === 0 || cardName.includes(query);

      card.classList.toggle('hidden', !(matchCategory && matchSearch));
    });
  }

  searchInput.addEventListener('input', updateGames);

  function filterGames(category, btn) {
    activeCategory = category;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    updateGames();
  }

  async function loadGames() {
    try {
      const response = await fetch('/api/games');
      if (!response.ok) {
        const errData = await response.json().catch(() => ({ error: `Status ${response.status}` }));
        throw new Error(errData.error);
      }
      
      const folders = await response.json();
      gameGrid.innerHTML = '';

      for (const folder of folders) {
        const folderName = folder.name;
        
        let metadata = {
          title: folderName.charAt(0).toUpperCase() + folderName.slice(1).replace(/-/g, ' '),
          description: 'Jogue agora este jogo multiplayer no navegador.',
          category: 'acao',
          image: `./${folderName}/thumb.png`,
          tags: ['Multiplayer', 'Web'],
          background: 'linear-gradient(135deg,#1a2635,#0f1923)'
        };

        try {
          const metaResponse = await fetch(`./${folderName}/metadata.json`);
          if (metaResponse.ok) {
            const customMeta = await metaResponse.json();
            metadata = { ...metadata, ...customMeta };
          }
        } catch (err) {}

        const card = document.createElement('a');
        card.className = 'card';
        card.href = `./${folderName}/`;
        card.dataset.category = metadata.category;
        card.dataset.name = `${metadata.title.toLowerCase()} ${folderName.toLowerCase()} ${metadata.category}`;

        const tagsHTML = metadata.tags.map((tag, i) => `
          <span class="tag ${i > 0 ? 'gray' : ''}">${tag}</span>
        `).join('');

        card.innerHTML = `
          <div class="card-thumb" style="background: ${metadata.background};">
            <img src="${metadata.icon}" alt="${metadata.title}" onerror="this.src='https://jogosdagalera.pages.dev/logowpp.png';">
          </div>
          <div class="card-body">
            <div class="card-title">${metadata.title}</div>
            <div class="card-desc">${metadata.description}</div>
            <div class="card-tags">${tagsHTML}</div>
          </div>
        `;

        gameGrid.appendChild(card);
      }

      updateGames();

    } catch (error) {
      console.error(error);
      gameGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #ff4a4a; padding: 20px;">Erro: ${error.message}</p>`;
    }
  }

  document.addEventListener('DOMContentLoaded', loadGames);
</script>
</body>
</html>
