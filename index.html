<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos da Galera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #121215;
            --border: #1f1f24;
            --border-hover: #3f3f46;
            --text: #ffffff;
            --text-muted: #71717a;
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 0 1.5rem;
        }

        /* Navbar Minimalista */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.1rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* Categorias / Filtros Estilo Bloob */
        .header-section {
            max-width: 1300px;
            margin: 1rem auto 2.5rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .categories {
            display: flex;
            gap: 0.5rem;
        }

        .cat-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .cat-btn.active, .cat-btn:hover {
            color: var(--text);
            border-color: var(--border-hover);
            background: #18181c;
        }

        .tv-prompt {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tv-prompt i {
            color: #22c55e;
        }

        /* Grid de Cards */
        .grid {
            max-width: 1300px;
            margin: 0 auto 4rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #18181c;
            position: relative;
            overflow: hidden;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .card:hover .thumb img {
            opacity: 1;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
        }

        .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .players {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Footer */
        footer {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .header-section { flex-direction: column; align-items: start; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <i class="fa-solid fa-dice"></i> Jogos da Galera
        </a>
        <div class="nav-links">
            <a href="#">Sobre</a>
        </div>
    </nav>

    <div class="header-section">
        <div class="categories">
            <button class="cat-btn active">Todos</button>
            <button class="cat-btn">Tabuleiros</button>
            <button class="cat-btn">Cartas</button>
            <button class="cat-btn">Party</button>
        </div>
        <div class="tv-prompt">
            <i class="fa-solid fa-tv"></i> Ideal para jogar na TV da sala
        </div>
    </div>

    <main class="grid">

        <!-- Jogo 1 -->
        <a href="#" class="card">
            <div class="thumb">
                <img src="https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?q=80&w=500" alt="Tabuleiro">
            </div>
            <div class="info">
                <div class="title">Ludo da Galera</div>
                <div class="meta">
                    <span class="players"><i class="fa-solid fa-users"></i> 2-4 Jogadores</span>
                    <span>Tabuleiros</span>
                </div>
            </div>
        </a>

        <!-- Jogo 2 -->
        <a href="#" class="card">
            <div class="thumb">
                <img src="https://images.unsplash.com/photo-1585504198199-20277593b94f?q=80&w=500" alt="Cartas">
            </div>
            <div class="info">
                <div class="title">Duelo de Cartas</div>
                <div class="meta">
                    <span class="players"><i class="fa-solid fa-users"></i> 2 Jogadores</span>
                    <span>Cartas</span>
                </div>
            </div>
        </a>

        <!-- Jogo 3 -->
        <a href="#" class="card">
            <div class="thumb">
                <img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d?q=80&w=500" alt="Party">
            </div>
            <div class="info">
                <div class="title">Stop! Corporativo</div>
                <div class="meta">
                    <span class="players"><i class="fa-solid fa-users"></i> 2-10 Jogadores</span>
                    <span>Party</span>
                </div>
            </div>
        </a>

        <!-- Jogo 4 -->
        <a href="#" class="card">
            <div class="thumb">
                <img src="https://images.unsplash.com/photo-1566694271453-390536dd1f0d?q=80&w=500" alt="Xadrez">
            </div>
            <div class="info">
                <div class="title">Xadrez Rápido</div>
                <div class="meta">
                    <span class="players"><i class="fa-solid fa-users"></i> 2 Jogadores</span>
                    <span>Tabuleiros</span>
                </div>
            </div>
        </a>

    </main>

    <footer>
        &copy; 2026 Jogos da Galera. Feito para unir o pessoal.
    </footer>

</body>
</html>
