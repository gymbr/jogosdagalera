<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó P2P Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        .domino-hand-piece:hover { transform: translateY(-8px); }
        /* Esconder barra de rolagem da mesa */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Topbar -->
    <header id="topbar" class="bg-slate-800 p-3 border-b-4 border-slate-700 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-extrabold text-base tracking-wider text-emerald-400">🀫 DOMINÓ P2P</h1>
                <div class="flex items-center space-x-1.5 text-[11px] text-slate-400 font-mono mt-0.5">
                    <span>Sala:<strong id="topbar-room-id" class="text-indigo-400">...</strong></span>
                    <button onclick="copyLink()" class="bg-slate-700 hover:bg-indigo-600 text-white px-2 py-0.5 rounded text-[10px] font-bold transition">📋 Copiar</button>
                </div>
            </div>
            <button onclick="leaveRoom()" class="bg-slate-700 hover:bg-red-600 text-[11px] font-bold py-1 px-2.5 rounded-lg transition">➡️ Sair</button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow flex flex-col items-center justify-start p-3 w-full max-w-md mx-auto mb-12 space-y-4">
        
        <!-- Lobby Overlay -->
        <div id="screen-lobby" class="fixed inset-0 bg-slate-950/80 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-slate-900 border-2 border-slate-700 p-6 rounded-2xl max-w-sm w-full shadow-2xl space-y-4">
                <h2 class="text-xl font-extrabold">Aguardando Conexão</h2>
                <p class="text-slate-400 text-xs">Compartilhe o link com seu oponente para iniciar a partida.</p>
                <div id="connection-status" class="text-amber-400 text-xs font-medium animate-pulse">Buscando servidor...</div>
            </div>
        </div>

        <!-- Placar e Status -->
        <div class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-2xl flex items-center justify-between text-center">
            <div class="flex-1">
                <span class="text-xs font-bold text-emerald-400 block">Suas Peças</span>
                <span id="count-me" class="text-2xl font-mono font-black">0</span>
            </div>
            <div class="px-3 border-x border-slate-700 flex flex-col items-center justify-center min-w-[120px]">
                <span id="turn-text" class="text-xs font-black text-amber-400 uppercase tracking-wider">Carregando...</span>
                <span class="text-[9px] text-slate-400 font-mono mt-1">Dormido: <span id="count-boneyard">0</span></span>
            </div>
            <div class="flex-1">
                <span class="text-xs font-bold text-blue-400 block">Oponente</span>
                <span id="count-opp" class="text-2xl font-mono font-black">0</span>
            </div>
        </div>

        <!-- Tela do Jogo / Mesa -->
        <div id="screen-game" class="w-full space-y-4 hidden flex-grow flex flex-col justify-between">
            
            <!-- Mesa de Jogo (Esteira de Peças) -->
            <div class="w-full bg-slate-950/60 rounded-2xl p-4 border border-slate-800 flex flex-col items-center justify-center min-h-[160px] relative">
                <span class="text-[10px] uppercase font-bold text-slate-500 absolute top-2 tracking-widest">Mesa de Jogo</span>
                
                <!-- Container de Rolagem Horizontal do Fluxo de Peças -->
                <div id="board-flow" class="w-full flex items-center justify-center space-x-1.5 overflow-x-auto py-6 no-scrollbar min-h-[90px]">
                    <!-- Peças jogadas entram aqui -->
                </div>

                <!-- Botões de Ação de Encaixe Dinâmico -->
                <div id="placement-overlay" class="absolute inset-0 flex justify-between items-center px-4 bg-slate-950/40 rounded-2xl hidden">
                    <button onclick="playSelectedPiece('left')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black py-2 px-3 rounded-lg shadow-lg transition">⬅️ Encaixar Esquerda</button>
                    <button onclick="playSelectedPiece('right')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black py-2 px-3 rounded-lg shadow-lg transition">Encaixar Direita ➡️</button>
                </div>
            </div>

            <!-- Controles Auxiliares (Comprar e Passar) -->
            <div class="grid grid-cols-2 gap-2 w-full">
                <button id="btn-draw" onclick="drawFromBoneyard()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider border border-slate-700 transition disabled:opacity-40">
                    ➕ Comprar Peça
                </button>
                <button id="btn-pass" onclick="passTurn()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider border border-slate-700 transition disabled:opacity-40">
                    🏳️ Passar Vez
                </button>
            </div>

            <!-- Mão do Jogador -->
            <div class="w-full space-y-1">
                <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider block text-center">Sua Mão (Selecione uma peça para jogar)</span>
                <div id="player-hand" class="flex flex-wrap justify-center gap-2 pt-2 bg-slate-900/40 p-2 rounded-xl min-h-[90px] border border-slate-800">
                    <!-- Injeção via JS -->
                </div>
            </div>

        </div>

        <!-- Tela de Fim de Jogo -->
        <div id="screen-game-over" class="w-full bg-slate-800 p-6 rounded-2xl border-2 border-amber-500 text-center space-y-4 hidden">
            <h2 id="game-over-title" class="text-3xl font-black text-green-400">🏆 VITÓRIA!</h2>
            <p id="game-over-msg" class="text-sm text-slate-300">Você bateu o jogo!</p>
            <button onclick="window.location.reload()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider shadow-lg transition">
                🔄 Jogar Novamente
            </button>
        </div>

    </main>

    <script>
        let peer = null, conn = null, myRole = '', roomCode = '';
        let myHand = [], boneyard = [], board = [];
        let leftEnd = null, rightEnd = null;
        let opponentPieceCount = 7, isMyTurn = false;
        let selectedPieceIndex = null;

        const screenLobby = document.getElementById('screen-lobby');
        const screenGame = document.getElementById('screen-game');
        const screenGameOver = document.getElementById('screen-game-over');
        const playerHandContainer = document.getElementById('player-hand');
        const boardFlowContainer = document.getElementById('board-flow');

        const urlParams = new URLSearchParams(window.location.search);
        roomCode = urlParams.get('room');

        if (!roomCode) {
            const generatedCode = 'DOMINO-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('hosted_domino_room', generatedCode);
            window.location.href = window.location.origin + window.location.pathname + '?room=' + generatedCode;
        } else {
            document.getElementById('topbar-room-id').innerText = roomCode;
            myRole = (roomCode === localStorage.getItem('hosted_domino_room')) ? 'red' : 'blue';
            if (myRole === 'red') initHost(roomCode); else initGuest(roomCode);
        }

        function initHost(code) {
            peer = new Peer(code);
            peer.on('open', () => document.getElementById('connection-status').innerText = "Aguardando Oponente...");
            peer.on('connection', (connection) => { conn = connection; handleEvents(); });
        }

        function initGuest(code) {
            peer = new Peer();
            peer.on('open', () => {
                document.getElementById('connection-status').innerText = "Conectando ao Host...";
                conn = peer.connect(code);
                handleEvents();
            });
        }

        function handleEvents() {
            conn.on('open', () => {
                screenLobby.classList.add('hidden');
                screenGame.classList.remove('hidden');
                if (myRole === 'red') setupNewGame();
            });

            conn.on('data', (data) => {
                if (data.type === 'START_GAME') {
                    myHand = data.guestHand;
                    boneyard = data.boneyard;
                    opponentPieceCount = data.hostHandCount;
                    isMyTurn = data.yourTurn;
                    updateUI();
                } else if (data.type === 'PIECE_PLAYED') {
                    board = data.board;
                    leftEnd = data.leftEnd;
                    rightEnd = data.rightEnd;
                    opponentPieceCount = data.oppHandCount;
                    isMyTurn = data.yourTurn;
                    checkGameOver();
                    updateUI();
                } else if (data.type === 'OPPONENT_ACTION') {
                    boneyard = data.boneyard;
                    opponentPieceCount = data.oppHandCount;
                    isMyTurn = data.yourTurn;
                    updateUI();
                }
            });
        }

        function setupNewGame() {
            let deck = [];
            for (let i = 0; i <= 6; i++) {
                for (let j = i; j <= 6; j++) {
                    deck.push({ v1: i, v2: j });
                }
            }
            deck.sort(() => Math.random() - 0.5);

            myHand = deck.splice(0, 7);
            let guestHand = deck.splice(0, 7);
            boneyard = deck;

            isMyTurn = true; 
            opponentPieceCount = 7;

            conn.send({
                type: 'START_GAME',
                guestHand: guestHand,
                boneyard: boneyard,
                hostHandCount: myHand.length,
                yourTurn: false
            });

            updateUI();
        }

        function updateUI() {
            document.getElementById('count-me').innerText = myHand.length;
            document.getElementById('count-opp').innerText = opponentPieceCount;
            document.getElementById('count-boneyard').innerText = boneyard.length;

            const turnText = document.getElementById('turn-text');
            if (isMyTurn) {
                turnText.innerText = "Sua Vez!";
                turnText.className = "text-xs font-black text-emerald-400 uppercase tracking-wider animate-pulse";
            } else {
                turnText.innerText = "Vez do Outro";
                turnText.className = "text-xs font-black text-slate-400 uppercase tracking-wider";
            }

            document.getElementById('btn-draw').disabled = !isMyTurn || boneyard.length === 0;
            document.getElementById('btn-pass').disabled = !isMyTurn;

            document.getElementById('placement-overlay').classList.add('hidden');
            selectedPieceIndex = null;

            renderBoard();
            renderHand();
        }

        function renderBoard() {
            boardFlowContainer.innerHTML = '';
            if (board.length === 0) {
                boardFlowContainer.innerHTML = `<span class="text-xs text-slate-500 italic">Mesa vazia. Comece jogando qualquer peça!</span>`;
                return;
            }

            board.forEach(piece => {
                const div = document.createElement('div');
                div.className = `flex bg-white text-slate-900 font-mono font-black border border-slate-300 rounded shadow px-2 py-3 text-sm items-center divide-x divide-slate-400 min-w-[54px] justify-center`;
                div.innerHTML = `<span class="px-1">${piece.v1}</span><span class="px-1">${piece.v2}</span>`;
                boardFlowContainer.appendChild(div);
            });
        }

        function renderHand() {
            playerHandContainer.innerHTML = '';
            myHand.forEach((piece, index) => {
                const btn = document.createElement('button');
                btn.className = `flex bg-white text-slate-900 font-mono font-black border border-slate-400 rounded-lg shadow-md px-3 py-4 text-base items-center divide-x divide-slate-400 transition-transform domino-hand-piece`;
                if (selectedPieceIndex === index) {
                    btn.className += " ring-4 ring-amber-400 border-transparent transform -translate-y-2";
                }
                btn.innerHTML = `<span class="px-1.5">${piece.v1}</span><span class="px-1.5">${piece.v2}</span>`;
                btn.onclick = () => selectPiece(index);
                playerHandContainer.appendChild(btn);
            });
        }

        function selectPiece(index) {
            if (!isMyTurn) return;

            if (selectedPieceIndex === index) {
                selectedPieceIndex = null;
                document.getElementById('placement-overlay').classList.add('hidden');
                renderHand();
                return;
            }

            selectedPieceIndex = index;
            renderHand();

            if (board.length === 0) {
                playSelectedPiece('left'); // Primeira peça entra direto
            } else {
                document.getElementById('placement-overlay').classList.remove('hidden');
            }
        }

        function playSelectedPiece(side) {
            if (selectedPieceIndex === null) return;
            const piece = myHand[selectedPieceIndex];

            let valid = false;
            let orientedPiece = { ...piece };

            if (board.length === 0) {
                leftEnd = piece.v1;
                rightEnd = piece.v2;
                board.push(orientedPiece);
                valid = true;
            } else if (side === 'left') {
                if (piece.v2 === leftEnd) {
                    leftEnd = piece.v1;
                    board.unshift(orientedPiece);
                    valid = true;
                } else if (piece.v1 === leftEnd) {
                    orientedPiece = { v1: piece.v2, v2: piece.v1 };
                    leftEnd = piece.v2;
                    board.unshift(orientedPiece);
                    valid = true;
                }
            } else if (side === 'right') {
                if (piece.v1 === rightEnd) {
                    rightEnd = piece.v2;
                    board.push(orientedPiece);
                    valid = true;
                } else if (piece.v2 === rightEnd) {
                    orientedPiece = { v1: piece.v2, v2: piece.v1 };
                    rightEnd = piece.v1;
                    board.push(orientedPiece);
                    valid = true;
                }
            }

            if (valid) {
                myHand.splice(selectedPieceIndex, 1);
                isMyTurn = false;

                conn.send({
                    type: 'PIECE_PLAYED',
                    board: board,
                    leftEnd: leftEnd,
                    rightEnd: rightEnd,
                    oppHandCount: myHand.length,
                    yourTurn: true
                });

                checkGameOver();
                updateUI();
            } else {
                alert("Essa peça não encaixa nesta extremidade!");
            }
        }

        function drawFromBoneyard() {
            if (!isMyTurn || boneyard.length === 0) return;
            
            const piece = boneyard.pop();
            myHand.push(piece);

            conn.send({
                type: 'OPPONENT_ACTION',
                boneyard: boneyard,
                oppHandCount: myHand.length,
                yourTurn: false // Mantém o turno com o jogador atual para ele verificar se pode jogar a nova peça
            });

            updateUI();
        }

        function passTurn() {
            if (!isMyTurn) return;
            isMyTurn = false;

            conn.send({
                type: 'OPPONENT_ACTION',
                boneyard: boneyard,
                oppHandCount: myHand.length,
                yourTurn: true
            });

            updateUI();
        }

        function checkGameOver() {
            if (myHand.length === 0 || opponentPieceCount === 0) {
                screenGame.classList.add('hidden');
                screenGameOver.classList.remove('hidden');

                const title = document.getElementById('game-over-title');
                const msg = document.getElementById('game-over-msg');

                if (myHand.length === 0) {
                    title.innerText = "🏆 VITÓRIA!";
                    title.className = "text-3xl font-black text-green-400";
                    msg.innerText = "Sensacional! Você bateu todas as suas peças e venceu!";
                } else {
                    title.innerText = "💀 DERROTA!";
                    title.className = "text-3xl font-black text-red-500";
                    msg.innerText = "O oponente usou todas as peças primeiro.";
                }
            }
        }

        function copyLink() {
            const shareLink = window.location.origin + window.location.pathname + '?room=' + roomCode;
            navigator.clipboard.writeText(shareLink).then(() => alert('Link da sala copiado!'));
        }

        function leaveRoom() {
            localStorage.removeItem('hosted_domino_room');
            if (conn) conn.close();
            if (peer) peer.destroy();
            window.location.href = window.location.origin + window.location.pathname;
        }

        window.addEventListener('beforeunload', () => {
            if (conn) conn.close();
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
